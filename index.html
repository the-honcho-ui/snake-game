<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake - Fixed Edition</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff9d;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        canvas { display: block; background-color: #000; }
        .ui-layer { text-align: center; margin-bottom: 10px; }
        #score-board { font-size: 24px; margin-bottom: 5px; }
        #status { font-size: 14px; height: 20px; color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div id="score-board">SCORE: 0</div>
        <div id="status">PRESS ANY ARROW KEY TO START</div>
    </div>

    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GRID_SIZE = 20;
        const TILE_COUNT = 20; 
        const INITIAL_SPEED = 100;
        const BOOST_SPEED = 50;
        const BOOST_DURATION = 5000;
        
        const COLORS = {
            snake: '#00ff9d',
            head: '#ffffff',
            food: '#ff3e3e',
            boost: '#00d4ff'
        };

        // --- GAME STATE ---
        let canvas = document.getElementById('snakeGame');
        let ctx = canvas.getContext('2d');
        let scoreBoard = document.getElementById('score-board');
        let statusDisplay = document.getElementById('status');

        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        let food = {x: 5, y: 5};
        let powerUp = null;
        
        let dx = 0;
        let dy = 0;
        let score = 0;
        let isBoosting = false;
        let gameActive = true;
        let gameStarted = false;

        // --- CONTROLS ---
        document.addEventListener('keydown', (e) => {
            // Restart on Space if Game Over
            if (!gameActive && e.code === "Space") {
                location.reload();
            }
            
            // Start the game on first key press
            if (!gameStarted && [37, 38, 39, 40].includes(e.keyCode)) {
                gameStarted = true;
                statusDisplay.innerText = "";
            }
            changeDirection(e);
        });

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            if (keyPressed === 37 && dx !== 1) { dx = -1; dy = 0; } // Left
            if (keyPressed === 38 && dy !== 1) { dx = 0; dy = -1; } // Up
            if (keyPressed === 39 && dx !== -1) { dx = 1; dy = 0; } // Right
            if (keyPressed === 40 && dy !== -1) { dx = 0; dy = 1; } // Down
        }

        // --- CORE LOGIC ---
        function main() {
            if (didGameEnd()) {
                gameActive = false;
                statusDisplay.innerText = "GAME OVER - PRESS SPACE TO RESTART";
                statusDisplay.style.color = COLORS.food;
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                drawPowerUp();
                if (gameStarted) advanceSnake();
                drawSnake();
                main();
            }, isBoosting ? BOOST_SPEED : INITIAL_SPEED);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 1;
                scoreBoard.innerText = `SCORE: ${score}`;
                createFood();
                if (score % 10 === 0) createPowerUp();
            } else if (powerUp && snake[0].x === powerUp.x && snake[0].y === powerUp.y) {
                activateBoost();
                powerUp = null;
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (!gameStarted) return false;
            // Hit Walls
            if (snake[0].x < 0 || snake[0].x >= TILE_COUNT || snake[0].y < 0 || snake[0].y >= TILE_COUNT) return true;
            // Hit Self
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * TILE_COUNT);
            food.y = Math.floor(Math.random() * TILE_COUNT);
        }

        function createPowerUp() {
            powerUp = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            statusDisplay.innerText = "SPEED BOOST DROPPED!";
        }

        function activateBoost() {
            isBoosting = true;
            statusDisplay.innerText = "HYPER-DRIVE ACTIVE!";
            setTimeout(() => {
                isBoosting = false;
                if (gameActive) statusDisplay.innerText = "";
            }, BOOST_DURATION);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? COLORS.head : COLORS.snake;
                ctx.shadowBlur = isBoosting ? 15 : 5;
                ctx.shadowColor = COLORS.snake;
                ctx.fillRect(part.x * GRID_SIZE, part.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
            });
            ctx.shadowBlur = 0;
        }

        function drawFood() {
            ctx.fillStyle = COLORS.food;
            ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
        }

        function drawPowerUp() {
            if (powerUp) {
                ctx.fillStyle = COLORS.boost;
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLORS.boost;
                ctx.fillRect(powerUp.x * GRID_SIZE, powerUp.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                ctx.shadowBlur = 0;
            }
        }

        main();
    </script>
</body>
</html>
